<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="Sharq Gavhari — premium digital menu for restaurant guests" />

    <!-- Generic PWA hint (Chrome / Android). -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari Add-to-Home-Screen support. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Sharq Gavhari" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!--
      Icons.
      The repo currently ships an SVG icon at /icons/icon.svg which is used by
      Chromium PWAs via manifest.json. iOS Safari does not reliably honor SVG
      apple-touch-icon — if you want a polished home-screen icon on iPhone/iPad,
      drop a 180×180 PNG at /icons/apple-touch-icon.png and the link below will
      pick it up automatically (the SVG remains a fallback).
    -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Sharq Gavhari — Premium Menu</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
